name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      # Injected from GitHub Actions secrets – never commit real keys.
      # Set via: Settings → Secrets and variables → Actions → New repository secret
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: ${{ vars.GROQ_MODEL || 'groq/llama-3.3-70b-versatile' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile app.py config.py \
            llm/__init__.py llm/client.py \
            scraper/__init__.py scraper/web.py scraper/github.py \
            ui/__init__.py ui/components.py
          echo "All files pass syntax check"

      - name: Unit tests
        run: |
          python - <<'EOF'
          import sys, ast

          def test(name, fn):
              try:
                  fn()
                  print(f"  PASS  {name}")
              except Exception as e:
                  print(f"  FAIL  {name}: {e}")
                  sys.exit(1)

          def t_config():
              from config import settings
              assert hasattr(settings, "groq_model")
              assert settings.groq_model.startswith("groq/")

          def t_scraper_helpers():
              from scraper.web import _same_domain, _extract_links
              from scraper.github import _is_binary
              assert _same_domain("https://a.com/x", "https://a.com/y")
              assert not _same_domain("https://a.com", "https://b.com")
              links = _extract_links('<a href="/p">X</a>', "https://site.com")
              assert "https://site.com/p" in links
              assert _is_binary("logo.png") and not _is_binary("main.py")

          def t_llm_import():
              from llm import answer_question
              from llm.client import _PROMPT_TEMPLATE
              assert callable(answer_question)
              assert "{question}" in _PROMPT_TEMPLATE and "{context}" in _PROMPT_TEMPLATE

          def t_ui_import():
              from ui.components import inject_css, render_content
              assert callable(inject_css) and callable(render_content)

          test("config", t_config)
          test("scraper helpers", t_scraper_helpers)
          test("llm import", t_llm_import)
          test("ui import", t_ui_import)
          print("All tests passed.")
          EOF
